<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copie du src iframe dans la page</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      padding: 24px;
      line-height: 1.5;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    button {
      cursor: pointer;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid currentColor;
      background: transparent;
      font: inherit;
    }

    iframe {
      width: 100%;
      min-height: 300px;
      border: 1px solid #999;
      border-radius: 12px;
      margin: 12px 0 24px;
    }

    #status {
      opacity: 0.8;
    }

    #copied-content {
      border: 1px solid #999;
      border-radius: 12px;
      padding: 16px;
      min-height: 180px;
      overflow: auto;
    }

    .error {
      color: #b00020;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Copier le contenu du src iframe dans la page</h1>

    <div class="toolbar">
      <button id="copy-button" type="button">Copier le contenu de l’iframe</button>
      <span id="status" aria-live="polite">Prêt.</span>
    </div>

    <!-- Remplace seulement le src par ton fichier/page à intégrer.
         Tu peux garder un chemin relatif : aucune URL absolue n’est obligatoire. -->
    <iframe
      id="source-frame"
      src="https://popcdn.day/player.php?stream=CMTVPT"
      title="Source à copier"
      loading="lazy">
    </iframe>

    <h2>Contenu copié</h2>
    <section id="copied-content" aria-live="polite"></section>
  </main>

  <script src="./main.js" defer></script>
</body>
</html>
